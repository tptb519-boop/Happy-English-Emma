<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy English Emma v2.0</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header><h1>🤖 Happy English Emma v2.0</h1><p>Học 100 câu giao tiếp cơ bản</p></header>
<main>
<section class="left-panel">
<h2>Emma</h2>
<p>Hello! I'm Emma. Let's learn English together!</p>
</section>
<section class="center-panel">
<div class="question-card">
<h3>QUESTION</h3>
<h2>Hello! How are you?</h2>
<p>Xin chào! Bạn khỏe không?</p>
</div>
<div class="answer-card">
<h3>ANSWER</h3>
<h2>I'm fine, thank you.</h2>
<p>Mình khỏe, cảm ơn.</p>
</div>
<div class="buttons">
<button>🎤 Trả lời</button>
<button>🔁 Luyện lại</button>
<button>➡ Tiếp tục</button>
</div>
</section>
</main>
</body>
</html>
